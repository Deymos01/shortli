name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: 'true'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: 'true'

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test -v -race -count=1 \
            $(go list ./... | grep -v 'shortli/tests') \
            2>&1 | tee unit-tests.log

      - name: Upload unit test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-log
          path: unit-tests.log
          retention-days: 3

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24
          cache: 'true'

      - name: Download dependencies
        run: go mod download

      - name: Build app
        run: go build -o shortli ./cmd/shortli

      - name: Prepare SQLite storage directory
        run: mkdir -p storage

      - name: Start app in background
        env:
          CONFIG_PATH: config/local.yaml
          HTTP_SERVER_PASSWORD: mypass
        run: |
          ./shortli &
          echo "APP_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for app to be ready
        run: |
          echo "Waiting for server on localhost:8082..."
          for i in $(seq 1 20); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/url \
                --user myuser:mypass | grep -qE '^(200|405|400)$'; then
              echo "Server is up!"
              exit 0
            fi
            echo "Attempt $i/20 — sleeping 1s..."
            sleep 1
          done
          echo "Server did not start in time"
          exit 1

      - name: Run integration tests
        run: |
          go test -v -count=1 -tags=integration \
            ./tests/... \
            2>&1 | tee integration-tests.log

      - name: Stop app
        if: always()
        run: kill "$APP_PID" || true

      - name: Upload integration test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-log
          path: integration-tests.log
          retention-days: 3